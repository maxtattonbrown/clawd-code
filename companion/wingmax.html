<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WingMax</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F0E8; --card: #FFFFFF; --fg: #2D2B26; --muted: #7A756B;
    --accent: #DA7756; --green: #3E7A4F; --tan: #DDD1C0; --border: #E0D8CC;
    --mono: "SF Mono", Menlo, Consolas, monospace;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--fg); line-height: 1.6;
    min-height: 100vh; display: flex; align-items: flex-end; justify-content: center;
  }

  .page {
    max-width: 440px; width: 100%; padding: 24px 24px 48px;
    display: flex; flex-direction: column; gap: 20px; align-items: flex-start;
  }

  /* ── WingMax avatar ─────────────────── */
  .wingmax {
    display: flex; align-items: flex-end; gap: 12px; width: 100%;
  }

  .avatar {
    width: 44px; height: 44px; background: var(--accent); border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 16px; font-weight: 700; color: white;
    flex-shrink: 0; transition: transform 0.2s ease;
    user-select: none;
  }

  .avatar.bounce {
    animation: bounce 0.4s ease;
  }

  @keyframes bounce {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  /* Eye blink: > briefly becomes - */
  .avatar .eye { display: inline; }

  /* Working state: hide mouth, show dots */
  .avatar.working .mouth { display: none; }
  .avatar.working .dots { display: inline; }
  .avatar .dots { display: none; }

  .avatar .dots span {
    animation: dotPulse 1.4s ease-in-out infinite;
  }
  .avatar .dots span:nth-child(2) { animation-delay: 0.2s; }
  .avatar .dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dotPulse {
    0%, 80%, 100% { opacity: 0.2; }
    40% { opacity: 1; }
  }

  /* ── Message history ─────────────────── */
  .history {
    margin-left: 56px; width: calc(100% - 56px);
    display: flex; flex-direction: column; gap: 8px;
    max-height: 240px; overflow-y: auto;
  }

  .history:empty { display: none; }

  .history-msg {
    font-size: 13px; line-height: 1.5; color: var(--muted);
    padding: 8px 14px;
    background: var(--bg); border-radius: 12px;
    border: 1px solid var(--border);
    animation: fadeIn 0.3s ease;
  }

  .history-msg .history-files {
    font-family: var(--mono); font-size: 11px; color: var(--tan);
    margin-top: 2px;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Speech bubble ──────────────────── */
  .bubble {
    background: var(--card); border-radius: 18px 18px 18px 4px;
    border: 1px solid var(--border);
    box-shadow: 0 2px 8px rgba(45,43,38,0.06);
    padding: 20px 24px; flex: 1; position: relative;
  }

  .bubble-text {
    font-size: 16px; line-height: 1.6; margin-bottom: 4px;
  }

  .bubble-text.muted { color: var(--muted); }

  .bubble-files {
    font-family: var(--mono); font-size: 12px; color: var(--tan);
  }

  /* ── Suggestion ─────────────────────── */
  .suggest {
    margin-left: 56px; width: calc(100% - 56px);
    background: var(--bg); border-radius: 12px;
    padding: 14px 18px; text-align: center;
    border: 1px dashed var(--border);
  }

  .suggest-label { font-size: 13px; color: var(--muted); margin-bottom: 4px; }

  .suggest-cmd {
    font-family: var(--mono); font-size: 14px; font-weight: 500; color: var(--fg);
  }

  /* ── Preview ────────────────────────── */
  .preview {
    display: none; width: 100%; margin-left: 0;
    background: var(--card); border-radius: 16px;
    border: 2px solid var(--green); box-shadow: 0 4px 16px rgba(62,122,79,0.10);
    overflow: hidden;
  }
  .preview.visible { display: block; animation: pop 0.5s ease-out; }

  @keyframes pop {
    from { opacity: 0; transform: scale(0.97); }
    to { opacity: 1; transform: scale(1); }
  }

  .preview-bar {
    padding: 10px 20px; font-size: 13px; color: var(--green); font-weight: 600;
    border-bottom: 1px solid var(--border);
  }

  .preview iframe {
    width: 100%; height: 340px; border: none; background: white;
  }

  /* ── Footer ─────────────────────────── */
  .footer {
    margin-left: 56px; font-size: 12px; color: var(--tan);
  }

  .footer a { color: var(--muted); text-decoration: none; }
  .footer a:hover { color: var(--accent); }

  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  @media (max-width: 480px) {
    .page { padding: 16px 12px 32px; }
    .bubble { padding: 16px 18px; }
    .suggest, .footer { margin-left: 48px; width: calc(100% - 48px); }
    .avatar { width: 36px; height: 36px; font-size: 13px; border-radius: 10px; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="wingmax">
    <div class="avatar" id="avatar" aria-hidden="true"><span class="eye">&gt;</span><span class="mouth">_</span><span class="dots"><span>.</span><span>.</span><span>.</span></span></div>
    <div class="bubble">
      <div class="bubble-text" id="bubble-text">Hey! I'm WingMax. I'll keep you company while you use Claude Code over in your terminal.</div>
      <div class="bubble-files" id="bubble-files"></div>
    </div>
  </div>

  <div class="history" id="history"></div>

  <div class="suggest" id="suggest">
    <div class="suggest-label" id="suggest-label">In your terminal, try typing:</div>
    <div class="suggest-cmd" id="suggest-cmd">hello</div>
  </div>

  <div class="preview" id="preview">
    <div class="preview-bar">Here's what you made</div>
    <iframe id="preview-frame" title="Live preview" sandbox="allow-scripts allow-same-origin"></iframe>
  </div>

  <div class="footer" id="footer">
    You can't break anything &middot; <a href="https://code.claude.com/docs/en/quickstart" target="_blank" rel="noopener">About Claude Code</a>
  </div>

</div>
<script>
(function() {
  'use strict';

  var POLL_MS = 800, DONE_MS = 4000, STATUS_URL = '/status.json', CONFIG_URL = '/config.json';
  var seenEvents = 0, phase = 'welcome', timer = null;
  var turnEvents = [], hasPreview = false, pvVer = 0, lastFC = 0;
  var mode = 'beginner'; // beginner or intermediate
  var lastWorkComment = '', workCommentShown = false;

  var MAX_HISTORY = 8;

  var avatar     = document.getElementById('avatar');
  var bubbleText = document.getElementById('bubble-text');
  var bubbleFiles = document.getElementById('bubble-files');
  var history    = document.getElementById('history');
  var suggest    = document.getElementById('suggest');
  var sugLabel   = document.getElementById('suggest-label');
  var sugCmd     = document.getElementById('suggest-cmd');
  var preview    = document.getElementById('preview');
  var pvFrame    = document.getElementById('preview-frame');
  var footer     = document.getElementById('footer');

  function pick(a) { return a[Math.floor(Math.random() * a.length)]; }

  var eyeEl = avatar.querySelector('.eye');

  // ── Load config (mode) ──
  fetch(CONFIG_URL).then(function(r) {
    if (!r.ok) return;
    return r.json();
  }).then(function(cfg) {
    if (cfg && cfg.mode) mode = cfg.mode;
    applyMode();
  }).catch(function() {});

  function applyMode() {
    if (mode === 'intermediate') {
      footer.innerHTML = 'Claude Code docs &middot; <a href="https://code.claude.com/docs/en/quickstart" target="_blank" rel="noopener">Quickstart</a>';
    }
  }

  // ── Avatar expressions ──
  function avatarWorking() {
    avatar.className = 'avatar working';
  }

  function avatarDone() {
    avatar.className = 'avatar bounce';
    blink();
  }

  function blink() {
    eyeEl.textContent = '-';
    setTimeout(function() { eyeEl.textContent = '>'; }, 200);
  }

  function scheduleIdleBlink() {
    var delay = 8000 + Math.random() * 12000;
    setTimeout(function() {
      if (phase !== 'working') blink();
      scheduleIdleBlink();
    }, delay);
  }
  scheduleIdleBlink();

  var lastBubbleText = '';
  var lastBubbleFiles = '';

  function pushToHistory(text, files) {
    if (!text || text === 'Claude\u2019s on it\u2026') return;
    // Dedup: don't repeat the same message consecutively
    var last = history.lastElementChild;
    if (last && last.firstChild && last.firstChild.textContent === text) return;
    var msg = document.createElement('div');
    msg.className = 'history-msg';
    msg.textContent = text;
    if (files) {
      var f = document.createElement('div');
      f.className = 'history-files';
      f.textContent = files;
      msg.appendChild(f);
    }
    history.appendChild(msg);
    // Trim old messages
    while (history.children.length > MAX_HISTORY) {
      history.removeChild(history.firstChild);
    }
    history.scrollTop = history.scrollHeight;
  }

  function say(text, muted) {
    bubbleText.textContent = text;
    bubbleText.className = 'bubble-text' + (muted ? ' muted' : '');
  }

  // ── Turn-level signal aggregation ──
  function extractTurnSignals(evts) {
    var readLangs = {}, writeLangs = {}, fileCats = {}, bashCats = {};
    var hasTestFail = false, hasBuildFail = false, hasError = false;
    var testSummary = '', errorHint = '';
    var totalLines = 0, hasAgent = false;

    evts.forEach(function(e) {
      var s = e.signals || {};
      if (s.lang) {
        if (e.type === 'file_create' || e.type === 'file_edit') {
          writeLangs[s.lang] = true;
        } else {
          readLangs[s.lang] = true;
        }
      }
      if (s.file_category) fileCats[s.file_category] = true;
      if (s.category) bashCats[s.category] = true;
      if (s.exit_ok === false) hasError = true;
      if (s.category === 'test' && s.exit_ok === false) hasTestFail = true;
      if (s.category === 'build' && s.exit_ok === false) hasBuildFail = true;
      if (s.test_summary && !testSummary) testSummary = s.test_summary;
      if (s.error_hint && !errorHint) errorHint = s.error_hint;
      if (s.line_count) totalLines += s.line_count;
      if (e.type === 'agent') hasAgent = true;
    });

    return {
      readLanguages: Object.keys(readLangs),
      writeLanguages: Object.keys(writeLangs),
      languages: Object.keys(writeLangs).concat(
        Object.keys(readLangs).filter(function(l) { return !writeLangs[l]; })
      ),
      fileCategories: Object.keys(fileCats),
      bashCategories: Object.keys(bashCats),
      hasTestFailure: hasTestFail,
      hasBuildFailure: hasBuildFail,
      hasError: hasError,
      hasAgent: hasAgent,
      testSummary: testSummary,
      errorHint: errorHint,
      totalLines: totalLines
    };
  }

  // ── Pattern detection across full session history ──
  // WingMax "chews" on all events and only speaks when a pattern emerges.
  var lastPattern = '', sessionStart = Date.now(), lastCommitTime = 0;

  function detectPattern(allEvents) {
    if (allEvents.length === 0) return '';

    var now = Date.now();
    var sig = extractTurnSignals(allEvents);

    // Count patterns across the session
    var editsByFile = {}, errorCount = 0, testRuns = 0, testFails = 0;
    var totalEdits = 0, totalCreates = 0, totalReads = 0, commitCount = 0;

    allEvents.forEach(function(e) {
      var s = e.signals || {};
      if (e.type === 'file_edit' && e.detail) {
        editsByFile[e.detail] = (editsByFile[e.detail] || 0) + 1;
        totalEdits++;
      }
      if (e.type === 'file_create') totalCreates++;
      if (e.type === 'file_read') totalReads++;
      if (s.exit_ok === false) errorCount++;
      if (s.category === 'test') { testRuns++; if (s.exit_ok === false) testFails++; }
      if (s.category === 'git') commitCount++;
    });

    // Find most-edited file
    var hotFile = '', hotCount = 0;
    for (var f in editsByFile) {
      if (editsByFile[f] > hotCount) { hotFile = f; hotCount = editsByFile[f]; }
    }

    var minutesWorking = Math.round((now - sessionStart) / 60000);

    // ── Priority-ordered patterns ──

    // 1. Test-fix cycle: tests ran, failed, edits happened, tests ran again
    if (testFails > 0 && testRuns > testFails && totalEdits > 0)
      return pick([
        'Test-fix-test loop running. That\u2019s TDD \u2014 let it work.',
        'Claude\u2019s in a test-fix cycle. ' + testRuns + ' test runs so far.',
      ]);

    // 2. Tests just failed (latest signal)
    if (sig.hasTestFailure && sig.testSummary)
      return sig.testSummary + '. Read the output yourself \u2014 it\u2019s usually clearer than Claude\u2019s summary.';
    if (sig.hasTestFailure)
      return 'Tests broke. Check the terminal for the actual error.';

    // 3. Tests just passed
    if (sig.bashCategories.indexOf('test') >= 0 && !sig.hasTestFailure)
      return pick([
        'All green. /commit before you touch anything else.',
        'Tests passing. Lock it in.',
      ]);

    // 4. Repeated errors
    if (errorCount >= 2)
      return pick([
        errorCount + ' errors this session. If Claude\u2019s going in circles, steer it.',
        'Multiple errors. Might be worth a different approach.',
      ]);

    // 5. Build failure
    if (sig.hasBuildFailure && sig.errorHint)
      return 'Build broke: ' + sig.errorHint.substring(0, 50);
    if (sig.hasBuildFailure)
      return 'Build failed. The error message is in the terminal.';

    // 6. Error just happened
    if (sig.hasError && sig.errorHint)
      return sig.errorHint.substring(0, 60);

    // 7. Same file edited 3+ times (thrashing)
    if (hotCount >= 3)
      return pick([
        hotFile + ' \u2014 ' + hotCount + ' edits. Maybe describe the end state you want.',
        'You keep coming back to ' + hotFile + '. Try telling Claude exactly what it should look like.',
      ]);

    // 8. No commit in a while with edits happening
    if (totalEdits >= 4 && commitCount === 0 && minutesWorking >= 10)
      return pick([
        minutesWorking + ' minutes of edits, no commits. /commit gives you a save point.',
        'Been editing a while without committing. Worth saving your progress.',
      ]);

    // 9. Just committed
    if (sig.bashCategories.indexOf('git') >= 0 && !sig.hasError) {
      lastCommitTime = now;
      return pick([
        'Committed. Clean slate.',
        'Work saved. Good stopping point if you need one.',
      ]);
    }

    // 10. First file created in session
    if (totalCreates === 1 && allEvents[0].type === 'file_create') {
      var lang = (allEvents[0].signals || {}).lang;
      if (lang) return 'First ' + lang + ' file. Have a look \u2014 then tell Claude what to change.';
      return 'First file created. Open it up and see what Claude made.';
    }

    // 11. Heavy reading (exploring)
    if (totalReads >= 8 && totalEdits === 0)
      return pick([
        totalReads + ' files read, nothing changed yet. Claude\u2019s still figuring things out.',
        'Big exploration pass. If Claude seems stuck, try being more specific.',
      ]);

    // 12. Subagent
    if (sig.hasAgent)
      return 'Subagent finished. Claude delegated part of the task.';

    // 13. Multi-language writes
    if (sig.writeLanguages.length >= 2)
      return 'Working across ' + sig.writeLanguages.join(' and ') + ' this session.';

    // Nothing worth commenting on
    return '';
  }

  // ── Done commentary (what Claude did) ──
  function unique(arr) {
    var seen = {};
    return arr.filter(function(x) { return seen[x] ? false : (seen[x] = true); });
  }

  function comment(evts) {
    var createdRaw = [], editedRaw = [], hasRead = false, hasCmd = false, hasSearch = false, hasWeb = false;
    evts.forEach(function(e) {
      if (e.type === 'file_create' && e.detail) createdRaw.push(e.detail);
      if (e.type === 'file_edit' && e.detail) editedRaw.push(e.detail);
      if (e.type === 'file_read') hasRead = true;
      if (e.type === 'command') hasCmd = true;
      if (e.type === 'search') hasSearch = true;
      if (e.type === 'web') hasWeb = true;
    });
    var created = unique(createdRaw);
    var edited = unique(editedRaw);
    var sig = extractTurnSignals(evts);
    var hasHtml = created.some(function(f) { return f.endsWith('.html'); });
    var readCount = evts.filter(function(e) { return e.type === 'file_read'; }).length;
    var totalEvts = evts.length;
    var langStr = sig.languages.length > 0 ? sig.languages.join(' and ') : '';

    if (mode === 'beginner') {
      // Signal-driven commentary first
      if (sig.hasTestFailure && sig.testSummary)
        return 'Claude ran the tests: ' + sig.testSummary + '. It\u2019ll keep working on this.';
      if (sig.hasTestFailure)
        return 'Some tests didn\u2019t pass. Claude will probably try to fix them.';
      if (sig.bashCategories.indexOf('test') >= 0 && !sig.hasTestFailure)
        return pick([
          'Claude ran the tests and everything passed \u2014 that\u2019s the green light!',
          'Tests all passing. That means the code is doing what it should.',
        ]);
      if (sig.hasBuildFailure)
        return 'The build didn\u2019t work first time \u2014 Claude\u2019s figuring out why.';
      // Then fall through to existing pattern-based commentary
      if (hasHtml)
        return pick([
          'Oh nice \u2014 Claude just built you a website! Have a look below.',
          'There you go \u2014 a whole website! Check it out below.',
        ]);
      if (created.length > 0 && langStr)
        return 'Claude just wrote some ' + langStr + ' for you. It\u2019s saved on your computer.';
      if (created.length > 0 && (hasRead || hasSearch))
        return pick([
          'Claude read your files first, then made something new. It always checks what\u2019s there before creating.',
          'Nice \u2014 Claude checked what you had, then created something based on it.',
        ]);
      if (created.length > 0)
        return pick([
          'There you go \u2014 Claude just made that for you. It\u2019s saved on your computer.',
          'Done! Claude created that for you \u2014 it\u2019s a real file you can open.',
        ]);
      if (edited.length > 0 && langStr)
        return 'Claude updated your ' + langStr + ' files. Only the bits that needed changing.';
      if (edited.length > 0)
        return pick([
          'Claude just updated your files. Only the bits that needed changing.',
          'Done \u2014 Claude made those changes for you.',
        ]);
      if (hasWeb)
        return 'Claude went online and looked some things up for you.';
      if (hasCmd)
        return pick([
          'Claude just ran a command on your computer \u2014 that\u2019s how it sets things up.',
          'Claude ran a command for you. Don\u2019t worry \u2014 it always asks permission first.',
        ]);
      if (hasRead || hasSearch)
        return pick([
          'Claude had a read through your files. Sometimes it just needs to understand what\u2019s there.',
          'Claude looked through your files to get the full picture.',
        ]);
      return 'All done!';
    } else {
      // Intermediate mode: signal-driven, character voice, no filler tips.
      var wLangStr = sig.writeLanguages.length > 0 ? sig.writeLanguages.join('/') : '';

      // Test results — highest signal
      if (sig.hasTestFailure && sig.testSummary)
        return pick([
          sig.testSummary + ' \u2014 read the output before letting Claude loose on it.',
          'Tests broke: ' + sig.testSummary + '. Worth understanding why before the next run.',
        ]);
      if (sig.hasTestFailure)
        return pick([
          'Tests broke. The failure message usually tells you exactly what\u2019s wrong.',
          'Test failure. Before Claude tries to fix it, check whether the test or the code is wrong.',
        ]);
      if (sig.bashCategories.indexOf('test') >= 0 && !sig.hasTestFailure)
        return pick([
          'All green. This is the moment to commit \u2014 before you touch anything else.',
          'Tests passing. /commit locks it in.',
        ]);

      // Build results
      if (sig.hasBuildFailure && sig.errorHint)
        return 'Build broke \u2014 ' + sig.errorHint.substring(0, 50) + '. Usually one thing, not five.';
      if (sig.hasBuildFailure)
        return 'Build failed. Scroll up for the actual error \u2014 start there.';

      // Errors
      if (sig.hasError && sig.errorHint)
        return pick([
          sig.errorHint.substring(0, 50) + ' \u2014 if Claude\u2019s about to retry the same thing, steer it.',
          'Hit an error: ' + sig.errorHint.substring(0, 50),
        ]);

      // Git commands — committed, pushed, branched
      if (sig.bashCategories.indexOf('git') >= 0 && !sig.hasError)
        return pick([
          'Committed. Clean slate for the next thing.',
          'Work saved to git. Good stopping point if you need one.',
          'Git done. You\u2019ve got a rollback point now.',
        ]);

      // File changes with language context
      if (hasHtml)
        return 'Built ' + created.filter(function(f) { return f.endsWith('.html'); }).join(', ') + '. Preview\u2019s below.';
      if (created.length > 0 && edited.length > 0) {
        var note = wLangStr ? ' (' + wLangStr + ')' : '';
        return pick([
          'Created and edited files' + note + '. Commit before the next thing \u2014 trust me.',
          'New files plus edits' + note + '. /commit now so you have a rollback point.',
        ]);
      }
      if (created.length > 0 && readCount >= 3 && wLangStr)
        return wLangStr + ' \u2014 Claude read before writing. Less likely to clash with what\u2019s there.';
      if (created.length > 0 && wLangStr)
        return pick([
          'New ' + wLangStr + '. Open ' + (created.length === 1 ? 'it' : 'them') + ' and read through \u2014 you\u2019ll spot things Claude won\u2019t.',
          'Fresh ' + wLangStr + '. If anything looks off, say so now rather than three steps later.',
        ]);
      if (created.length > 0)
        return 'New file' + (created.length > 1 ? 's' : '') + ' on disk. Have a read \u2014 you\u2019ll spot things Claude won\u2019t.';
      if (edited.length > 0 && totalEvts > 8) {
        var eNote = wLangStr ? ' across ' + wLangStr : '';
        return pick([
          'Bigger edit session' + eNote + '. Commit this before doing more \u2014 rolling back a big batch is painful.',
          'Substantial changes' + eNote + '. /commit while it\u2019s all working.',
        ]);
      }
      if (edited.length > 0 && wLangStr)
        return pick([
          'Edited your ' + wLangStr + '. "Show me the diff" is your friend here.',
          wLangStr + ' updated. Say "undo that" if it\u2019s not what you meant.',
        ]);
      if (edited.length > 0)
        return pick([
          'Edits done. "Show me the diff" if you want the details.',
          'Files updated. If it\u2019s not quite right, just say what\u2019s off.',
        ]);

      // Non-file-change turns — acknowledge what happened, don't teach
      if (sig.hasAgent)
        return pick([
          'Subagent finished. Claude delegated part of that task.',
          'Subagent came back. Claude splits work when it\u2019s complex.',
        ]);
      if (hasWeb)
        return pick([
          'Went online for that one. Probably wanted current docs.',
          'Web lookup done. Claude checks online when its training data might be stale.',
        ]);
      if (readCount >= 4)
        return pick([
          'Read-only pass \u2014 ' + readCount + ' files, ' + sig.totalLines + ' lines. No changes made.',
          'Just reading so far. Claude\u2019s understanding the codebase before acting.',
        ]);
      if (readCount > 0 || hasSearch)
        return 'Claude had a look around. No changes made.';
      if (hasCmd)
        return 'Command done. Check the terminal if you want the output.';

      // Truly nothing happened — stay quiet
      return '';
    }
  }

  function listFiles(evts) {
    var names = {};
    evts.forEach(function(e) {
      if ((e.type === 'file_create' || e.type === 'file_edit') && e.detail) names[e.detail] = true;
    });
    return Object.keys(names).join('  ');
  }

  // ── Suggestions per mode (signal-aware) ──
  function nextSuggestion(evts) {
    var hasCreated = evts.some(function(e) { return e.type === 'file_create'; });
    var hasEdited = evts.some(function(e) { return e.type === 'file_edit'; });
    var sig = extractTurnSignals(evts);

    if (mode === 'beginner') {
      if (sig.hasTestFailure) return pick(['ask Claude to fix the tests', 'explain what went wrong']);
      if (sig.hasBuildFailure) return pick(['ask Claude what happened', 'try a different approach']);
      if (sig.hasError) return pick(['ask Claude what happened', 'try something different']);
      if (hasCreated) return pick([
        'adjust the tone', 'check it for mistakes', 'explain what you just made',
        'try something completely different', 'make it shorter'
      ]);
      if (hasEdited) return pick([
        'change something else', 'undo that', 'check it over',
        'explain what changed', 'try something new'
      ]);
      return pick([
        'save that to a file', 'explain that in simpler terms',
        'try something different', 'help me write an email',
        'organise my files'
      ]);
    } else {
      if (sig.hasTestFailure) return pick([
        'scroll up and read the test output',
        '"run the tests again" \u2014 sometimes it\u2019s flaky',
      ]);
      if (sig.hasBuildFailure) return pick([
        'read the error \u2014 usually one line matters',
        '"try a different approach" if Claude\u2019s going in circles',
      ]);
      if (sig.hasError) return pick([
        'tell Claude what you actually want here',
        '"try a different approach"',
      ]);
      if (sig.bashCategories.indexOf('test') >= 0 && !sig.hasTestFailure)
        return '/commit \u2014 lock in the progress';
      if (sig.bashCategories.indexOf('git') >= 0)
        return pick([
          'keep going \u2014 you\u2019re in a good spot',
          'what\u2019s next?',
        ]);
      if (hasCreated && hasEdited)
        return '/commit \u2014 bigger changes are riskier to lose';
      if (hasCreated) return pick([
        '"show me the diff" \u2014 see what Claude wrote',
        '/commit \u2014 save before the next change',
        '"run the tests" \u2014 see if it works',
      ]);
      if (hasEdited) return pick([
        '"show me the diff" \u2014 diffs teach more than summaries',
        '/commit \u2014 small commits, easy rollbacks',
        '"run tests" \u2014 worth checking after edits',
      ]);
      if (sig.fileCategories.indexOf('config') >= 0)
        return '"does that config look right?" \u2014 Claude sometimes guesses at values';
      return pick([
        '/compact \u2014 free up context if the conversation\u2019s long',
        '"explain this codebase" \u2014 good starting point',
        '"run the tests" \u2014 see where things stand',
      ]);
    }
  }

  function welcomeSuggestion() {
    if (mode === 'beginner') {
      return pick([
        'help me draft an email to my team',
        'make me a simple website about space',
        'organise the files in this folder',
        'summarise this document for me',
        'help me plan my week',
        'explain what\u2019s in this folder'
      ]);
    } else {
      return pick([
        'explain this codebase to me',
        'refactor the auth flow',
        'write tests for the API',
        'find all TODO comments',
        'review recent git changes',
        'set up CI for this project'
      ]);
    }
  }

  function showPreview(fl) {
    if (hasPreview && fl.length === lastFC) return;
    // Only preview genuine project HTML files, not companion/config files
    var projectHtml = fl.filter(function(f) {
      return f.endsWith('.html') && f !== 'wingmax.html' && f !== 'sample-preview.html';
    });
    if (projectHtml.length === 0) return;
    var f = projectHtml[0];
    pvVer++;
    var url = '/preview/' + encodeURIComponent(f) + '?v=' + pvVer;
    // Check the file exists before showing preview
    fetch(url, { method: 'HEAD' }).then(function(r) {
      if (!r.ok) return;
      pvFrame.src = url;
      if (!hasPreview) { preview.classList.add('visible'); hasPreview = true; }
    }).catch(function() {});
  }

  // allSessionEvents accumulates across the whole session (not just one turn)
  var allSessionEvents = [];

  function onDone() {
    avatarDone();
    var files = listFiles(turnEvents);

    if (mode === 'intermediate') {
      // Pattern-based: check full session, only speak if new pattern
      var pattern = detectPattern(allSessionEvents);
      if (pattern && pattern !== lastPattern) {
        // Push previous observation to history before showing new one
        if (lastPattern) pushToHistory(lastPattern, '');
        say(pattern, false);
        lastPattern = pattern;
        bubbleFiles.textContent = files;
      } else if (files) {
        // No new pattern, but files changed — show files only
        bubbleFiles.textContent = files;
      }
      // If no pattern and no files, keep previous bubble (silence)
    } else {
      // Beginner mode: use per-turn comment as before
      var c = comment(turnEvents);
      if (c) {
        say(c, false);
        bubbleFiles.textContent = files;
      } else {
        if (files) bubbleFiles.textContent = files;
      }
    }

    sugLabel.textContent = mode === 'intermediate' ? pick(['Next move:', 'Worth trying:', 'If I were you:']) : 'You could try:';
    sugCmd.textContent = nextSuggestion(turnEvents);
    suggest.style.display = '';
    workCommentShown = false;
    phase = 'done';
  }

  function resetTimer() {
    if (timer) clearTimeout(timer);
    timer = setTimeout(function() { if (phase === 'working') onDone(); }, DONE_MS);
  }

  function poll() {
    fetch(STATUS_URL).then(function(r) {
      if (!r.ok) throw new Error();
      return r.json();
    }).then(function(data) {
      var evts = data.events || [], fl = data.files_touched || [];
      var hasHtml = data.has_html || false, stopped = data.stopped || false;
      var real = evts.filter(function(e) { return e.type !== 'hello'; });
      var hasHello = evts.length > real.length;

      if (hasHello && phase === 'welcome') {
        phase = 'ready';
        if (mode === 'beginner') {
          say('Claude Code is ready! Ask it anything \u2014 write an email, build something, organise your files, look something up. Whatever you need.', false);
        } else {
          say('Claude Code is ready. What are we working on?', false);
        }
        sugLabel.textContent = 'Try typing:';
        sugCmd.textContent = welcomeSuggestion();
      }

      if (real.length > seenEvents) {
        if (phase !== 'working') {
          // Push previous done message to history before starting new task
          // Don't push the ready/welcome messages — they're not useful history
          if (phase === 'done') {
            pushToHistory(bubbleText.textContent, bubbleFiles.textContent);
          }
          turnEvents = [];
          phase = 'working';
          avatarWorking();
          if (mode === 'beginner') {
            say('Claude\u2019s on it\u2026', true);
            bubbleFiles.textContent = '';
          }
          // Intermediate: keep previous bubble visible — the avatar dots show working state
          suggest.style.display = 'none';
          workCommentShown = false;
        }
        var newEvts = real.slice(0, real.length - seenEvents);
        newEvts.forEach(function(e) { turnEvents.push(e); allSessionEvents.push(e); });
        seenEvents = real.length;
        resetTimer();

        // During-work: check for urgent patterns (errors, test failures)
        if (mode === 'intermediate') {
          var pattern = detectPattern(allSessionEvents);
          if (pattern && pattern !== lastPattern) {
            say(pattern, true);
            lastPattern = pattern;
          }
        } else {
          // Beginner: use existing workComment for during-work
          var sig = extractTurnSignals(turnEvents);
          var total = turnEvents.length;
          var reads = turnEvents.filter(function(e) { return e.type === 'file_read'; }).length;
          if (sig.hasTestFailure)
            say('Claude ran the tests and some didn\u2019t pass. It\u2019ll probably try to fix that now.', true);
          else if (sig.hasBuildFailure)
            say('The build didn\u2019t work first time \u2014 Claude\u2019s figuring out why.', true);
          else if (sig.hasError)
            say('Something didn\u2019t go as expected \u2014 Claude\u2019s working through it.', true);
          else if (reads >= 6)
            say('Lots of reading \u2014 Claude likes to understand what\u2019s there before it acts.', true);
          else if (total >= 10)
            say('Claude\u2019s been busy \u2014 this is a bigger task. Hang tight!', true);
        }
      }

      if (stopped && phase === 'working') {
        if (timer) clearTimeout(timer);
        onDone();
      }

      if (hasHtml) showPreview(fl);
      lastFC = fl.length;
    }).catch(function() {});
  }

  setInterval(poll, POLL_MS);
  poll();
})();
</script>
</body>
</html>
